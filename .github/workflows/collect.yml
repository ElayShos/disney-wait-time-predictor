name: Collect Disney Wait Time Data

on:
  schedule:
    # This will trigger the workflow every 5 minutes during the specified hours
    - cron: "*/5 11-23 * * *"
    - cron: "*/5 0-6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wait-time-data
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reset repo to latest commit
        run: |
          git fetch origin
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas requests

      - name: Run data collector
        run: python collect_data.py

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          # Modified to add ALL new files and directories
          git add data/
          git commit -m "Update data: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push